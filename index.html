<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="landingTitle">Breath — One Minute</title>
<link rel="canonical" href="https://apps.apple.com/app/id6791719844">
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1rem; padding: 2rem; text-align: center;
    font: 1rem/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #fbfbfa; color: #1a1a18;
  }
  h1 { font-size: 1.5rem; font-weight: 600; margin: 0; }
  p { margin: 0; color: #5a5a55; }
  a { color: #0f766e; font-weight: 600; }
  #referral { display: none; flex-direction: column; align-items: center; gap: 1rem; }
  #code {
    font: 700 2.5rem/1.2 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.15em;
  }
  .button {
    display: inline-block; padding: 0.75rem 2rem; border: 0; border-radius: 999px;
    font: 600 1rem/1 inherit; font-family: inherit; cursor: pointer;
    background: #0f766e; color: #ffffff; text-decoration: none;
  }
  .button.secondary { background: transparent; color: #0f766e; border: 1.5px solid #0f766e; }
  @media (prefers-color-scheme: dark) {
    body { background: #14161a; color: #f2f2f0; }
    p { color: #a3a39d; }
    a { color: #5eead4; }
    .button { background: #5eead4; color: #14161a; }
    .button.secondary { background: transparent; color: #5eead4; border-color: #5eead4; }
  }
</style>
</head>
<body>
  <h1>Breath</h1>
  <p data-i18n="tagline">One minute. That's the whole app.</p>

  <div id="referral">
    <p data-i18n="invite">Your friend sent you an invite code — copy it, install Breath, and paste it on first launch.</p>
    <div id="code"></div>
    <button class="button" id="copy" type="button" data-i18n="copy">Copy code</button>
    <a class="button secondary" href="https://apps.apple.com/app/id6791719844" data-i18n="get">Get Breath</a>
  </div>

  <p id="fallback" data-i18n="fallback">Taking you to the App Store…<br>
    <a href="https://apps.apple.com/app/id6791719844">Open in the App Store</a></p>

  <!-- Before the script below, so the referral card is translated while it is still
       display:none and the swap is never visible as a repaint. -->
  <script src="/breath-site/i18n.js"></script>
  <script>
    // Sanitize before rendering: the raw query param never touches the DOM.
    // Valid codes are exactly 6 chars from the app's unambiguous alphabet.
    var raw = new URLSearchParams(location.search).get("ref") || "";
    var code = raw.toUpperCase().replace(/[^A-Z2-9]/g, "");
    var valid = code.length === 6 && /^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{6}$/.test(code);

    if (valid) {
      document.getElementById("fallback").style.display = "none";
      document.getElementById("code").textContent = code;
      document.getElementById("referral").style.display = "flex";
      var copy = document.getElementById("copy");
      copy.addEventListener("click", function () {
        navigator.clipboard.writeText(code).then(function () {
          copy.textContent = t("copied", "Copied ✓");
        }, function () {
          copy.textContent = t("copyFail", "Copy failed — long-press the code instead");
        });
      });
    } else {
      // No (or junk) ref: today's behaviour. JS-only redirect — a meta refresh in
      // <head> would fire before this script could cancel it on the ref path.
      location.replace("https://apps.apple.com/app/id6791719844");
    }
  </script>
</body>
</html>
